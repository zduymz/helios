apiVersion: v1
kind: Namespace
metadata:
  name: helios
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-cpp
  namespace: helios
  labels:
    app: llama-cpp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama-cpp
  template:
    metadata:
      labels:
        app: llama-cpp
    spec:
      containers:
        - name: server
          image: ghcr.io/ggml-org/llama.cpp:server
          args:
            - "-m"
            - "/models/qwen2.5-0.5b-instruct-q4_k_m.gguf"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "-c"
            - "4096"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: models
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: models
          hostPath:
            path: /models
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: llama-cpp
  namespace: helios
  labels:
    app: llama-cpp
spec:
  type: NodePort
  selector:
    app: llama-cpp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
